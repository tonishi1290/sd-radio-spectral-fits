# OMU1P85M 実機式準拠の器差パラメータ例
# model は pointing-fit fit/normalize で使う built-in 名です。
# a1..e2 はここでは arcsec 表記、g1 は無次元です。

[metadata]
model = "omu1p85m_actual_v1"
comment = "Template for OMU1P85M actual pointing model"

[pointing_params]
"a1[arcsec]" = 0.0
"a2[arcsec]" = 0.0
"a3[arcsec]" = 0.0
"b1[arcsec]" = 0.0
"b2[arcsec]" = 0.0
"b3[arcsec]" = 0.0
g1 = 0.0
"c1[arcsec]" = 0.0
"c2[arcsec]" = 0.0
"d1[arcsec]" = 0.0
"d2[arcsec]" = 0.0
"e1[arcsec]" = 0.0
"e2[arcsec]" = 0.0
