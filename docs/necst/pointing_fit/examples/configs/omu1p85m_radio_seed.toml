# OMU1P85M 実機式を電波ポインティングで使うときの初期値例
# まずは 0 初期値で十分ですが、e1/e2 を自由にしたいときはこの形式を使います。

[metadata]
model = "omu1p85m_actual_v1"
comment = "Initial values for radio-pointing fit"

[pointing_params]
"a1[arcsec]" = 0.0
"a2[arcsec]" = 0.0
"a3[arcsec]" = 0.0
"b1[arcsec]" = 0.0
"b2[arcsec]" = 0.0
"b3[arcsec]" = 0.0
g1 = 0.0
"c1[arcsec]" = 0.0
"c2[arcsec]" = 0.0
"d1[arcsec]" = 0.0
"d2[arcsec]" = 0.0
"e1[arcsec]" = 0.0
"e2[arcsec]" = 0.0
